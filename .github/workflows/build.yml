name: Cross-Platform Build
on: [push, pull_request]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libx11-dev \
            libxext-dev \
            libxrender-dev \
            libxinerama-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxi-dev \
            libudev-dev \
            libfreetype6-dev \
            libvorbis-dev \
            libflac-dev \
            libogg-dev \
            libopenal-dev \
            libgl1-mesa-dev

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Prepare Release Folder
        shell: bash
        run: |
            # Créer le dossier dist (le -p évite les erreurs s'il existe déjà)
            mkdir -p dist
            
            # 1. Chercher et copier l'exécutable (Linux ou Windows)
            # On cherche dans build/ et build/Release/
            find build -maxdepth 2 -name "Platformer*" -type f -exec cp {} dist/ \;
            
            # 2. Chercher et copier le bundle Mac (.app) s'il existe
            if [ -d build/Platformer.app ]; then
              cp -r build/Platformer.app dist/
            fi
            
            # 3. Copier le dossier assets
            if [ -d assets ]; then
              cp -r assets dist/
            fi
            
            # Vérification simple pour le log
            ls -R dist/
          
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: platformer-${{ matrix.os }}
          path: dist/